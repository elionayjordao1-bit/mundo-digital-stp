<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mundo Digital STP</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body{font-family:Arial;background:#f4f6f8;padding:20px}
h1{text-align:center}
input,button{padding:6px;margin:4px}
table{width:100%;border-collapse:collapse;background:#fff;margin-top:10px}
th,td{border:1px solid #ccc;padding:6px;text-align:center}
th{background:#2c7be5;color:#fff}
.hidden{display:none}
.card{background:#fff;padding:15px;margin:10px 0;border-radius:6px}
.baixo{background:#ffcccc}
button{cursor:pointer}
</style>
</head>

<body>

<h1>🏪 Mundo Digital STP</h1>

<div id="loginBox">
  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">
  <button onclick="login()">Entrar</button>
  <p id="erro" style="color:red"></p>
</div>

<div id="app" class="hidden">

<p>Usuário: <b id="userEmail"></b> | Função: <b id="userRole" style="color:#2c7be5">Carregando...</b></p>
<button onclick="logout()">Sair</button>

<div class="card" id="cardRelatorio">
<h3>💰 Relatório</h3>
<p>Hoje: <b id="vendasHoje">0 Db</b></p>
<p>Mês: <b id="vendasMes">0 Db</b></p>
<p>Total Estoque: <b id="totalEstoque">0 Db</b></p>
</div>

<div class="card" id="cardNovoProduto">
<h3>📦 Novo Produto</h3>
<input id="nome" placeholder="Produto">
<input id="estoque" type="number" placeholder="Qtd">
<input id="minimo" type="number" placeholder="Estoque mínimo">
<input id="compra" type="number" placeholder="Preço compra">
<input id="venda" type="number" placeholder="Preço venda">
<button onclick="addProduto()">Salvar</button>
</div>

<div class="card">
<h3>📋 Estoque</h3>
<button id="btnExportarEstoque" onclick="exportarEstoque()">📤 Exportar Excel</button>
<table>
<thead>
<tr>
<th>Produto</th><th>Qtd</th><th>Mín</th><th>Compra</th>
<th>Venda</th><th>Lucro</th><th>Total</th>
<th>+</th><th>Vender</th><th>🗑</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>
</div>

<div class="card" id="cardHistorico">
<h3>📜 Histórico</h3>
<button id="btnExportarHistorico" onclick="exportarHistorico()">📤 Exportar Excel</button>
<table>
<thead>
<tr>
<th>Produto</th><th>Tipo</th><th>Qtd</th>
<th>Valor</th><th>Usuário</th><th>Data</th>
</tr>
</thead>
<tbody id="historico"></tbody>
</table>
</div>

</div>

<script>
const firebaseConfig = {
apiKey:"AIzaSyBCw8qEFmYrBbRnDM4OFCgx-44FUtSbqts",
authDomain:"mundo-digital-stp.firebaseapp.com",
projectId:"mundo-digital-stp",
storageBucket:"mundo-digital-stp.appspot.com",
messagingSenderId:"1062673569126",
appId:"1:1062673569126:web:2e44ecbf098d90931464a7"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

// Variável global para armazenar a role do usuário logado
let usuarioRole = null;

function login(){
auth.signInWithEmailAndPassword(email.value,senha.value)
.catch(e=>erro.innerText=e.message);
}
function logout(){auth.signOut();}

auth.onAuthStateChanged(u=>{
if(u){
loginBox.classList.add("hidden");
app.classList.remove("hidden");
userEmail.innerText=u.email;

// Busca os dados do usuário a partir do UID exato na coleção 'usuarios'
db.collection("usuarios").doc(u.uid).get()
.then(doc => {
if(doc.exists) {
usuarioRole = doc.data().role;
userRole.innerText = usuarioRole.toUpperCase();

// Gerenciamento visual inicial baseado nas permissões do papel
if(usuarioRole === "admin") {
cardRelatorio.classList.remove("hidden");
cardNovoProduto.classList.remove("hidden");
cardHistorico.classList.remove("hidden");
btnExportarEstoque.classList.remove("hidden");
} else if(usuarioRole === "vendas") {
cardRelatorio.classList.add("hidden");
cardNovoProduto.classList.add("hidden");
cardHistorico.classList.add("hidden");
btnExportarEstoque.classList.add("hidden");
} else if(usuarioRole === "estoque") {
cardRelatorio.classList.add("hidden");
cardNovoProduto.classList.add("hidden");
cardHistorico.classList.add("hidden");
btnExportarEstoque.classList.add("hidden");
}

carregar();
} else {
alert("Erro: Este usuário não possui uma função associada na coleção de usuários.");
logout();
}
})
.catch(e => {
console.error("Erro ao obter regras de acesso:", e);
logout();
});

}else{
loginBox.classList.remove("hidden");
app.classList.add("hidden");
usuarioRole = null;
userRole.innerText = "Carregando...";
}
});

function addProduto(){
// Bloqueio no Console (F12)
if(usuarioRole !== "admin") {
return alert("Ação negada: Apenas administradores podem cadastrar produtos.");
}

db.collection("produtos").add({
nome:nome.value,
estoque:+estoque.value,
minimo:+minimo.value,
compra:+compra.value,
venda:+venda.value
});
}

function carregar(){
db.collection("produtos").onSnapshot(s=>{
lista.innerHTML="";
let total=0;
s.forEach(d=>{
let p=d.data();
let lucro=p.venda-p.compra;
let totalProd=p.estoque*p.venda;
total+=totalProd;

// Criação condicional dos botões de ação para a tabela de estoque
let botaoEntrada = "";
let botaoVenda = "";
let botaoExcluir = "";

if(usuarioRole === "admin") {
botaoEntrada = `<button onclick="mov('${d.id}','${p.nome}',${p.estoque},${p.venda},'entrada')">+</button>`;
botaoVenda = `<button onclick="mov('${d.id}','${p.nome}',${p.estoque},${p.venda},'saida')">Vender</button>`;
botaoExcluir = `<button onclick="del('${d.id}')">🗑</button>`;
} else if(usuarioRole === "vendas") {
botaoEntrada = `<button disabled style="opacity:0.5; cursor:not-allowed">+</button>`;
botaoVenda = `<button onclick="mov('${d.id}','${p.nome}',${p.estoque},${p.venda},'saida')">Vender</button>`;
botaoExcluir = `<button disabled style="opacity:0.5; cursor:not-allowed">🗑</button>`;
} else if(usuarioRole === "estoque") {
botaoEntrada = `<button onclick="mov('${d.id}','${p.nome}',${p.estoque},${p.venda},'entrada')">+</button>`;
botaoVenda = `<button disabled style="opacity:0.5; cursor:not-allowed">Vender</button>`;
botaoExcluir = `<button disabled style="opacity:0.5; cursor:not-allowed">🗑</button>`;
}

lista.innerHTML+=`
<tr class="${p.estoque<=p.minimo?'baixo':''}">
<td>${p.nome}</td>
<td>${p.estoque}</td>
<td>${p.minimo}</td>
<td>${p.compra} Db</td>
<td>${p.venda} Db</td>
<td>${lucro} Db</td>
<td>${totalProd} Db</td>
<td>${botaoEntrada}</td>
<td>${botaoVenda}</td>
<td>${botaoExcluir}</td>
</tr>`;
});
totalEstoque.innerText=total+" Db";
});

db.collection("movimentacoes").orderBy("data","desc")
.onSnapshot(s=>{
historico.innerHTML="";
let hoje=0,mes=0;
let now=new Date();

s.forEach(d=>{
let m=d.data();
let data=m.data.toDate();
let valor=Number(m.valor)||0;

if(data.toDateString()==now.toDateString()) hoje+=valor;
if(data.getMonth()==now.getMonth() && data.getFullYear()==now.getFullYear()) mes+=valor;

historico.innerHTML+=`
<tr>
<td>${m.produto}</td>
<td>${m.tipo}</td>
<td>${m.quantidade}</td>
<td>${valor} Db</td>
<td>${m.usuario}</td>
<td>${data.toLocaleString()}</td>
</tr>`;
});

vendasHoje.innerText=hoje+" Db";
vendasMes.innerText=mes+" Db";
});
}

function mov(id,nome,atual,preco,t){
// Bloqueio no Console (F12)
if(t=="entrada" && usuarioRole !== "admin" && usuarioRole !== "estoque") {
return alert("Ação negada: Você não possui permissão para dar entrada de mercadoria.");
}
if(t=="saida" && usuarioRole !== "admin" && usuarioRole !== "vendas") {
return alert("Ação negada: Você não possui permissão para realizar vendas.");
}

let q=+prompt("Quantidade:");
if(!q||q<=0)return;
let novo=t=="entrada"?atual+q:atual-q;
if(novo<0)return alert("Estoque insuficiente");

db.collection("produtos").doc(id).update({estoque:novo});
db.collection("movimentacoes").add({
produto:nome,
tipo:t,
quantidade:q,
valor:q*preco,
usuario:auth.currentUser.email,
data:new Date()
});
}

function del(id){
// Bloqueio no Console (F12)
if(usuarioRole !== "admin") {
return alert("Ação negada: Apenas administradores podem excluir produtos.");
}

if(confirm("Excluir produto?")){
db.collection("produtos").doc(id).delete();
}
}

function exportarEstoque(){
// Bloqueio no Console (F12)
if(usuarioRole !== "admin") {
return alert("Ação negada: Você não tem permissão para exportar dados.");
}

db.collection("produtos").get().then(s=>{
let c="Produto,Qtd,Min,Compra,Venda\n";
s.forEach(d=>{
let p=d.data();
c+=`${p.nome},${p.estoque},${p.minimo},${p.compra},${p.venda}\n`;
});
baixar(c,"estoque.csv");
});
}

function exportarHistorico(){
// Bloqueio no Console (F12)
if(usuarioRole !== "admin") {
return alert("Ação negada: Você não tem permissão para exportar dados.");
}

db.collection("movimentacoes").get().then(s=>{
let c="Produto,Tipo,Qtd,Valor,Usuario,Data\n";
s.forEach(d=>{
let m=d.data();
c+=`${m.produto},${m.tipo},${m.quantidade},${m.valor},${m.usuario},${m.data.toDate()}\n`;
});
baixar(c,"historico.csv");
});
}

function baixar(c,n){
let a=document.createElement("a");
a.href=URL.createObjectURL(new Blob([c]));
a.download=n;
a.click();
}
</script>

</body>
</html>
