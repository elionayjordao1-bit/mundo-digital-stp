<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mundo Digital STP</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body{font-family:Arial;background:#f4f6f8;padding:20px}
h1{text-align:center}
input,button,select{padding:6px;margin:4px}
table{width:100%;border-collapse:collapse;background:#fff;margin-top:10px}
th,td{border:1px solid #ccc;padding:6px;text-align:center}
th{background:#2c7be5;color:#fff}
.hidden{display:none}
.card{background:#fff;padding:15px;margin:10px 0;border-radius:6px}
.baixo{background:#ffcccc}
.desativado{background:#f2f2f2;color:#999}
button{cursor:pointer}
.btn-status-ativo{background:#28a745;color:#fff;border:none;border-radius:4px;padding:4px 8px}
.btn-status-inativo{background:#dc3545;color:#fff;border:none;border-radius:4px;padding:4px 8px}
</style>
</head>

<body>

<h1>🏪 Mundo Digital STP</h1>

<div id="loginBox">
  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">
  <button onclick="login()">Entrar</button>
  <p id="erro" style="color:red"></p>
</div>

<div id="app" class="hidden">

<p>Usuário: <b id="userEmail"></b> | Função: <b id="userRole" style="color:#2c7be5">Carregando...</b></p>
<button onclick="logout()">Sair</button>

<!-- Bloco de Relatório Financeiro -->
<div class="card" id="cardRelatorio">
<h3>💰 Relatório</h3>
<p>Hoje: <b id="vendasHoje">0 Db</b></p>
<p>Mês: <b id="vendasMes">0 Db</b></p>
<p>Total Estoque: <b id="totalEstoque">0 Db</b></p>
</div>

<!-- Bloco de Gestão de Funcionários (Apenas Admin) -->
<div class="card" id="cardFuncionarios">
<h3>👥 Funcionários</h3>
<div style="border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 10px;">
  <b id="tituloFormFunc">Criar Novo Funcionário:</b><br>
  <input id="funcEmail" placeholder="Email do Funcionário">
  <input id="funcSenha" type="password" placeholder="Senha Inicial">
  <select id="funcRole">
    <option value="venda1">Venda 1</option>
    <option value="venda2">Venda 2</option>
    <option value="estoque">Estoque</option>
    <option value="admin">Administrador</option>
  </select>
  <button onclick="salvarFuncionario()" id="btnSalvarFunc">Criar</button>
  <button onclick="cancelarEdicaoFunc()" id="btnCancelarFunc" class="hidden">Cancelar</button>
</div>
<table>
  <thead>
    <tr>
      <th>Email</th><th>Função</th><th>Estado</th><th>Ações</th>
    </tr>
  </thead>
  <tbody id="listaFuncionarios"></tbody>
</table>
</div>

<!-- Bloco de Cadastro de Novos Produtos -->
<div class="card" id="cardNovoProduto">
<h3>📦 Novo Produto</h3>
<input id="nome" placeholder="Produto">
<input id="estoque" type="number" placeholder="Qtd">
<input id="minimo" type="number" placeholder="Estoque mínimo">
<input id="compra" type="number" placeholder="Preço compra">
<input id="venda" type="number" placeholder="Preço venda">
<button onclick="addProduto()">Salvar</button>
</div>

<!-- Tabela Geral de Estoque -->
<div class="card" id="cardEstoque">
<h3>📋 Estoque</h3>
<button id="btnExportarEstoque" onclick="exportarEstoque()">📤 Exportar Excel</button>
<table id="tabelaEstoque">
<thead id="cabecalhoTabela"></thead>
<tbody id="lista"></tbody>
</table>
</div>

<!-- Histórico de Movimentações -->
<div class="card" id="cardHistorico">
<h3>📜 Histórico</h3>
<button id="btnExportarHistorico" onclick="exportarHistorico()">📤 Exportar Excel</button>
<table>
<thead>
<tr>
<th>Produto</th><th>Tipo</th><th>Qtd</th>
<th>Valor</th><th>Usuário</th><th>Data</th>
</tr>
</thead>
<tbody id="historico"></tbody>
</table>
</div>

</div>

<script>
const firebaseConfig = {
apiKey:"AIzaSyBCw8qEFmYrBbRnDM4OFCgx-44FUtSbqts",
authDomain:"mundo-digital-stp.firebaseapp.com",
projectId:"mundo-digital-stp",
storageBucket:"mundo-digital-stp.appspot.com",
messagingSenderId:"1062673569126",
appId:"1:1062673569126:web:2e44ecbf098d90931464a7"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

let usuarioRole = null;
let editandoFuncId = null; 
let listenerProdutos = null;
let listenerMovimentacoes = null;
let listenerFuncionarios = null;

function login(){
let erroCampo = document.getElementById("erro");
if(erroCampo) erroCampo.innerText = "";

// Login direto clássico para respeitar as regras do Firebase
auth.signInWithEmailAndPassword(email.value, senha.value)
.catch(e=> { if(erroCampo) erroCampo.innerText = e.message; });
}

function logout(){
if(listenerProdutos) listenerProdutos();
if(listenerMovimentacoes) listenerMovimentacoes();
if(listenerFuncionarios) listenerFuncionarios();
usuarioRole = null;
auth.signOut();
}

auth.onAuthStateChanged(u=>{
if(u){
loginBox.classList.add("hidden");
app.classList.remove("hidden");
userEmail.innerText=u.email;
userRole.innerText = "Carregando...";

db.collection("usuarios").doc(u.uid).get()
.then(doc => {
if(doc.exists) {
let dados = doc.data();

// Bloqueia o acesso imediatamente se a conta estiver desativada no banco
if(dados.status === "desativado") {
  alert("Esta conta foi desativada pelo administrador.");
  logout();
  return;
}

let valorRole = null;
Object.keys(dados).forEach(key => {
if(key.toLowerCase().includes("role")) { valorRole = dados[key]; }
});

if(valorRole) {
usuarioRole = valorRole.toLowerCase().trim();
userRole.innerText = usuarioRole.toUpperCase();

if(usuarioRole === "admin") {
cardRelatorio.style.display = "block";
cardNovoProduto.style.display = "block";
cardHistorico.style.display = "block";
cardFuncionarios.style.display = "block"; 
btnExportarEstoque.style.display = "inline-block";
btnExportarHistorico.style.display = "inline-block";
} 
else {
cardRelatorio.style.display = "none";
cardNovoProduto.style.display = "none";
cardHistorico.style.display = "none";
cardFuncionarios.style.display = "none"; 
btnExportarEstoque.style.display = "none";
}

carregar();
} else {
userRole.innerText = "SEM FUNÇÃO";
}
} else {
// Vinculo automático para novas contas criadas pelo painel
db.collection("usuarios").where("email", "==", u.email.toLowerCase()).get()
.then(snap => {
  if(!snap.empty) {
    let dadosEmail = snap.docs[0].data();
    if(dadosEmail.status === "desativado") {
      alert("Esta conta foi desativada.");
      logout();
      return;
    }
    db.collection("usuarios").doc(u.uid).set(dadosEmail);
    db.collection("usuarios").doc(snap.docs[0].id).delete();
    location.reload();
  } else {
    userRole.innerText = "NÃO ENCONTRADO";
  }
});
}
})
.catch(e => {
console.error(e);
userRole.innerText = "ERRO";
});

}else{
loginBox.classList.remove("hidden");
app.classList.add("hidden");
usuarioRole = null;
userRole.innerText = "Carregando...";
}
});

function addProduto(){
if(!usuarioRole || usuarioRole !== "admin") return alert("Ação negada.");
db.collection("produtos").add({
nome:nome.value,
estoque:+estoque.value,
minimo:+minimo.value,
compra:+compra.value,
venda:+venda.value
});
nome.value=""; estoque.value=""; minimo.value=""; compra.value=""; venda.value="";
}

// --- GESTÃO DE FUNCIONÁRIOS ---

function carregarFuncionarios() {
  if(usuarioRole !== "admin") return;
  
  listenerFuncionarios = db.collection("usuarios").onSnapshot(snapshot => {
    listaFuncionarios.innerHTML = "";
    snapshot.forEach(doc => {
      let f = doc.data();
      let id = doc.id;
      let emailTxt = f.email || "Sem Email";
      let roleTxt = (f.role || "venda1").toUpperCase();
      let statusTxt = f.status === "desativado" ? "Inativo" : "Ativo";
      let btnStatusClass = f.status === "desativado" ? "btn-status-inativo" : "btn-status-ativo";
      
      listaFuncionarios.innerHTML += `
        <tr class="${f.status === 'desativado' ? 'desativado' : ''}">
          <td><b>${emailTxt}</b></td>
          <td>${roleTxt}</td>
          <td><button class="${btnStatusClass}" onclick="alternarStatusFunc('${id}', '${f.status}')">${statusTxt}</button></td>
          <td>
            <button onclick="prepararEditarFunc('${id}', '${emailTxt}', '${f.role || 'venda1'}')">✏️ Editar</button>
            <button onclick="apagarFuncionario('${id}')">🗑️ Apagar</button>
          </td>
        </tr>
      `;
    });
  });
}

function salvarFuncionario() {
  let emailVal = funcEmail.value.toLowerCase().trim();
  let senhaVal = funcSenha.value;
  let roleVal = funcRole.value;

  if(!emailVal) return alert("Insira o email.");

  if(editandoFuncId) {
    db.collection("usuarios").doc(editandoFuncId).update({
      email: emailVal,
      role: roleVal
    }).then(() => {
      alert("Funcionário atualizado!");
      cancelarEdicaoFunc();
    });
  } else {
    if(!senhaVal) return alert("Insira uma senha inicial.");
    
    db.collection("usuarios").add({
      email: emailVal,
      role: roleVal,
      status: "ativo"
    }).then(() => {
      alert("Funcionário criado! Ele já pode fazer login.");
      funcEmail.value = ""; funcSenha.value = "";
    });
  }
}

function prepararEditarFunc(id, email, role) {
  editandoFuncId = id;
  tituloFormFunc.innerText = "Editar Funcionário:";
  funcEmail.value = email;
  funcSenha.value = "";
  funcSenha.disabled = true; 
  funcSenha.placeholder = "(Protegida)";
  funcRole.value = role;
  btnSalvarFunc.innerText = "Atualizar";
  btnCancelarFunc.classList.remove("hidden");
}

function cancelarEdicaoFunc() {
  editandoFuncId = null;
  tituloFormFunc.innerText = "Criar Novo Funcionário:";
  funcEmail.value = "";
  funcSenha.value = "";
  funcSenha.disabled = false;
  funcSenha.placeholder = "Senha Inicial";
  btnSalvarFunc.innerText = "Criar";
  btnCancelarFunc.classList.add("hidden");
}

function alternarStatusFunc(id, statusAtual) {
  let novoStatus = statusAtual === "desativado" ? "ativo" : "desativado";
  db.collection("usuarios").doc(id).update({ status: novoStatus });
}

function apagarFuncionario(id) {
  if(confirm("Deseja apagar permanentemente este funcionário?")) {
    db.collection("usuarios").doc(id).delete().then(() => {
      alert("Funcionário removido.");
    });
  }
}

// --- FIM DA GESTÃO DE FUNCIONÁRIOS ---

function carregar(){
if(listenerProdutos) listenerProdutos();
if(listenerMovimentacoes) listenerMovimentacoes();

let isAdmin = (usuarioRole === "admin");
cabecalhoTabela.innerHTML = `
<tr>
  <th>Produto</th><th>Qtd</th><th>Mín</th>
  ${isAdmin ? '<th>Compra</th>' : ''}
  <th>Venda</th>
  ${isAdmin ? '<th>Lucro</th>' : ''}
  <th>Total</th>
  <th>+</th><th>Vender</th><th>🗑</th>
</tr>`;

if(isAdmin) { carregarFuncionarios(); }

listenerProdutos = db.collection("produtos").onSnapshot(s=>{
lista.innerHTML="";
let total=0;
s.forEach(d=>{
let p=d.data();
let lucro=p.venda-p.compra;
let totalProd=p.estoque*p.venda;
total+=totalProd;

let botaoEntrada = ""; let botaoVenda = ""; let botaoExcluir = "";

if(usuarioRole === "admin") {
botaoEntrada = `<button onclick="mov('${d.id}','${p.nome}',${p.estoque},${p.venda},'entrada')">+</button>`;
botaoVenda = `<button onclick="mov('${d.id}','${p.nome}',${p.estoque},${p.venda},'saida')">Vender</button>`;
botaoExcluir = `<button onclick="del('${d.id}')">🗑</button>`;
} 
else if(usuarioRole.includes("venda")) {
botaoEntrada = `<button disabled style="opacity:0.3; cursor:not-allowed">+</button>`;
botaoVenda = `<button onclick="mov('${d.id}','${p.nome}',${p.estoque},${p.venda},'saida')">Vender</button>`;
botaoExcluir = `<button disabled style="opacity:0.3; cursor:not-allowed">🗑</button>`;
} 
else if(usuarioRole.includes("estoque")) {
botaoEntrada = `<button onclick="mov('${d.id}','${p.nome}',${p.estoque},${p.venda},'entrada')">+</button>`;
botaoVenda = `<button disabled style="opacity:0.3; cursor:not-allowed">Vender</button>`;
botaoExcluir = `<button disabled style="opacity:0.3; cursor:not-allowed">🗑</button>`;
}

lista.innerHTML+=`
<tr class="${p.estoque<=p.minimo?'baixo':''}">
<td>${p.nome}</td>
<td>${p.estoque}</td>
<td>${p.minimo}</td>
${isAdmin ? `<td>${p.compra} Db</td>` : ''}
<td>${p.venda} Db</td>
${isAdmin ? `<td>${lucro} Db</td>` : ''}
<td>${totalProd} Db</td>
<td>${botaoEntrada}</td>
<td>${botaoVenda}</td>
<td>${botaoExcluir}</td>
</tr>`;
});
totalEstoque.innerText=total+" Db";
});

listenerMovimentacoes = db.collection("movimentacoes").orderBy("data","desc")
.onSnapshot(s=>{
historico.innerHTML="";
let hoje=0,mes=0;
let now=new Date();

s.forEach(d=>{
let m=d.data();
if(!m.data) return;
let data=m.data.toDate();
let valor=Number(m.valor)||0;

if(data.toDateString()==now.toDateString()) hoje+=valor;
if(data.getMonth()==now.getMonth() && data.getFullYear()==now.getFullYear()) mes+=valor;

historico.innerHTML+=`
<tr>
<td>${m.produto}</td>
<td>${m.tipo}</td>
<td>${m.quantidade}</td>
<td>${valor} Db</td>
<td>${m.usuario}</td>
<td>${data.toLocaleString()}</td>
</tr>`;
});

vendasHoje.innerText=hoje+" Db";
vendasMes.innerText=mes+" Db";
});
}

function mov(id,nome,atual,preco,t){
if(!usuarioRole) return;
if(t=="entrada" && usuarioRole !== "admin" && !usuarioRole.includes("estoque")) return alert("Sem permissão");
if(t=="saida" && usuarioRole !== "admin" && !usuarioRole.includes("venda")) return alert("Sem permissão");

let q=+prompt("Quantidade:");
if(!q||q<=0)return;
let novo=t=="entrada"?atual+q:atual-q;
if(novo<0)return alert("Estoque insuficiente");

db.collection("produtos").doc(id).update({estoque:novo});
db.collection("movimentacoes").add({
produto:nome,
tipo:t,
quantidade:q,
valor:q*preco,
usuario:auth.currentUser.email,
data:new Date()
});
}

function del(id){
if(usuarioRole !== "admin") return;
if(confirm("Excluir produto?")){ db.collection("produtos").doc(id).delete(); }
}
function exportarEstoque(){
if(usuarioRole !== "admin") return;
db.collection("produtos").get().then(s=>{
let c="Produto,Qtd,Min,Compra,Venda\n";
s.forEach(d=>{ let p=d.data(); c+=`${p.nome},${p.estoque},${p.minimo},${p.compra},${p.venda}\n`; });
baixar(c,"estoque.csv");
});
}
function exportarHistorico(){
if(usuarioRole !== "admin") return;
db.collection("movimentacoes").get().then(s=>{
let c="Produto,Tipo,Qtd,Valor,Usuario,Data\n";
s.forEach(d=>{ let m=d.data(); c+=`${m.produto},${m.tipo},${m.quantidade},${m.valor},${m.usuario},${m.data.toDate()}\n`; });
baixar(c,"historico.csv");
});
}
function baixar(c,n){
let a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([c])); a.download=n; a.click();
}
</script>

</body>
</html>
